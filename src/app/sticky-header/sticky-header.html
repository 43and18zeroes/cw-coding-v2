<header class="header">
  <a class="logo" (click)="onNavigate(0)">Christoph</a>

  <button class="menu-btn" (click)="toggleMenu()" [class.open]="isMenuOpen()">
    <div class="hamburger-icon">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </button>
</header>

<nav class="sidebar" [class.active]="isMenuOpen()">
  <ul>
    <li (click)="onNavigate(1)">About me</li>
    <li (click)="onNavigate(2)">My skills</li>
    <li (click)="onNavigate(3)">Portfolio</li>
    <li (click)="onNavigate(4)">Contact</li>
  </ul>
</nav>

@if (isMenuOpen()) {
  <div class="backdrop" (click)="toggleMenu()"></div>
}

<!-- ========================
sticky-header.html
========================= -->

<header class="header">
  <a class="logo" (click)="onNavigate('top')">Christoph</a>

  <button class="menu-btn" (click)="toggleMenu()"
    [class.open]="isMenuOpen()">
    <div class="hamburger-icon">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </button>

  <div class="menu-desktop">
    @for (section of sections; track section.id) {
    <a (click)="onNavigate(section.id)">
      {{ section.title }}
    </a>
    }
  </div>
</header>

<nav class="sidebar" [class.active]="isMenuOpen()">
  <ul>
    @for (section of sections; track section.id) {
    <li (click)="onNavigate(section.id)">
      {{ section.title }}
    </li>
    }
  </ul>
</nav>

@if (isMenuOpen()) {
<div class="backdrop" (click)="toggleMenu()"></div>
}

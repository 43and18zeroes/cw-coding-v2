<!-- ========================
app.html
========================= -->

<div class="page-shell">
    <aside class="left-rail">
        <div class="brand">RM</div>
        <div class="section-counter">
            <span class="current">{{ activeIndex + 1 |
                number:'2.0' }}</span>
            <span class="divider"></span>
            <span class="total">{{ sections.length |
                number:'2.0' }}</span>
        </div>
    </aside>

    <nav class="right-rail" aria-label="Section navigation">
        @for (section of sections; track section.id; let i =
        $index) {
        <button type="button" class="dot"
            [class.active]="activeIndex === i"
            (click)="scrollToSection(i)">
        </button>
        }
    </nav>

    <main #scroller class="snap-container"
        (scroll)="onScroll()">
        <app-hero-section [class.active]="activeIndex === 0"
            (next)="scrollToSection(1)" />

        <app-hero-section [class.active]="activeIndex === 1"
            (next)="scrollToSection(2)" />

        <app-hero-section [class.active]="activeIndex === 2"
            (next)="scrollToSection(0)" />
    </main>
</div>

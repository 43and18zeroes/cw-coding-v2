<!-- ========================
app.html
========================= -->

<div class="portrait-lock">
    <div class="lock-icon">🔄</div>
    <p>Please rotate your device to portrait mode for the
        best experience.</p>
</div>

<div class="page-shell">
    <nav class="right-rail" aria-label="Section navigation">
        @for (section of sections; track section.id; let i =
        $index) {
        <button type="button" class="dot"
            [class.active]="activeIndex === i"
            (click)="scrollToSection(i)">
        </button>
        }
    </nav>

    <main #scroller class="snap-container"
        (scroll)="onScroll()">
        <app-hero-section [class.active]="activeIndex === 0"
            (next)="scrollToSection(1)" />
        <app-about-me-section
            [class.active]="activeIndex === 1"
            (next)="scrollToSection(2)" />
        <app-skills-section
            [class.active]="activeIndex === 2"
            (next)="scrollToSection(3)" />
        <app-portfolio-section-00
            [class.active]="activeIndex === 3"
            (next)="scrollToSection(4)" />
        <app-portfolio-section-01
            [class.active]="activeIndex === 4"
            (next)="scrollToSection(5)" />
        <app-contact-section
            [class.active]="activeIndex === 5"
            (next)="scrollToSection(0)" />
    </main>
</div>

<!-- ========================
app.html
========================= -->

<div class="page-shell">
    <aside class="left-rail">
        <div class="brand">RM</div>

        <div class="section-counter">
            <span class="current">{{ activeIndex + 1 |
                number:'2.0' }}</span>
            <span class="divider"></span>
            <span class="total">{{ sections.length |
                number:'2.0' }}</span>
        </div>
    </aside>

    <nav class="right-rail" aria-label="Section navigation">
        @for (section of sections; track section.id; let i =
        $index) {
        <button type="button" class="dot"
            [class.active]="activeIndex === i"
            [attr.aria-label]="'Gehe zu Abschnitt ' + section.title"
            (click)="scrollToSection(i)">
        </button>
        }
    </nav>

    <main #scroller class="snap-container"
        (scroll)="onScroll()">
        @for (section of sections; track section.id; let i =
        $index) {
        <section class="snap-section"
            [class.active]="activeIndex === i"
            [style.background-image]="'linear-gradient(rgba(0,0,0,.28), rgba(0,0,0,.52)), url(' + section.image + ')'">

            <div class="content-wrap">
                <div class="eyebrow">{{ section.eyebrow }}
                </div>
                <h1>{{ section.title }}</h1>
                <p>{{ section.text }}</p>

                <div class="actions">
                    <button class="primary-btn"
                        type="button"
                        (click)="scrollToSection(i + 1)">
                        {{ i === sections.length - 1 ?
                        'Zurück nach oben' : 'Mehr
                        entdecken' }}
                    </button>
                </div>
            </div>
        </section>
        }
    </main>
</div>

<!-- ========================
app.html
========================= -->

<app-portrait-lock-component></app-portrait-lock-component>

<div class="page-shell">
  <app-sticky-header [sections]="sections"
    [activeSectionId]="sections[activeIndex()].id"
    (navigate)="scrollToSectionById($event)">
  </app-sticky-header>

  <nav class="right-rail" aria-label="Section navigation">
    @for (section of sections; track section.id; let i =
    $index) {
    <button type="button" class="dot"
      [class.active]="activeIndex() === i"
      (click)="scrollToSection(i)">
    </button>
    }
  </nav>

  <main #scroller class="snap-container"
    (scroll)="onScroll()">
    @for (section of sections; track section.id; let i =
    $index) {
    <div class="snap-section" [class.snap-section--ios]="isIOs()">
      <ng-container
        *ngComponentOutlet="section.component"></ng-container>
    </div>
    }
  </main>
</div>

<div class="portrait-lock">

    <span class="lock-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
            <path
                d="M16.48 2.52 15.07 3.93l2.04 2.04H7c-1.1 0-2 .9-2 2v6h2v-6h10.11l-2.04 2.04 1.41 1.41L21 7l-4.52-4.48ZM19 10v6H8.89l2.04-2.04-1.41-1.41L5 17l4.48 4.48 1.41-1.41-2.04-2.04H19c1.1 0 2-.9 2-2v-6h-2Z" />
        </svg>
    </span>

    <div class="lock-content">
        <h2>Portrait Mode Required</h2>
        <p>Please rotate your device to portrait mode for
            the best experience.</p>
    </div>
</div>

<div class="page-shell">
    <app-sticky-header [sections]="sections"
        [activeSectionId]="sections[activeIndex()].id"
        (navigate)="scrollToSectionById($event)">
    </app-sticky-header>

    <nav class="right-rail" aria-label="Section navigation">
        @for (section of sections; track section.id; let i =
        $index) {
        <button type="button" class="dot"
            [class.active]="activeIndex() === i"
            (click)="scrollToSection(i)">
        </button>
        }
    </nav>

    <main #scroller class="snap-container"
        (scroll)="onScroll()">
        <app-hero-section
            [class.active]="activeIndex() === 0"
            (next)="scrollToSection(1)">
        </app-hero-section>

        <app-about-me-section
            [class.active]="activeIndex() === 1"
            (next)="scrollToSection(2)">
        </app-about-me-section>

        <app-skills-section
            [class.active]="activeIndex() === 2"
            (next)="scrollToSection(3)">
        </app-skills-section>

        <app-portfolio-section-00
            [class.active]="activeIndex() === 3"
            (next)="scrollToSection(4)">
        </app-portfolio-section-00>

        <app-portfolio-section-01
            [class.active]="activeIndex() === 4"
            (next)="scrollToSection(5)">
        </app-portfolio-section-01>

        <app-contact-section
            [class.active]="activeIndex() === 5"
            (next)="scrollToSection(0)">
        </app-contact-section>
    </main>
</div>
